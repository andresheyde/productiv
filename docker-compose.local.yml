services:
  productiv-postgres:
    image: postgres:16-alpine
    container_name: productiv-local-postgres
    environment:
      POSTGRES_DB: productiv_local
      POSTGRES_PASSWORD: productiv
      POSTGRES_USER: productiv
    ports:
      - "54329:5432"
    volumes:
      - productiv-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U productiv -d productiv_local"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama
    container_name: productiv-local-ollama
    ports:
      - "11434:11434"
    volumes:
      - productiv-ollama-data:/root/.ollama

volumes:
  productiv-postgres-data:
  productiv-ollama-data:
